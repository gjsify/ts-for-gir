name: PR Lint

on:
  pull_request:
    types:
      - opened
      - edited
      - reopened
      - synchronize

permissions:
  pull-requests: read

# Allowed conventional-commit types (keep in sync with .release-it.json
# preset.types and .commitlintrc.cjs type-enum):
#   feat → Features | fix → Bug Fixes | perf → Performance Improvements
#   revert → Reverts | docs → Documentation | refactor → Code Refactoring
#   build → Build System | ci → Continuous Integration
#   chore → Maintenance | test → Tests

jobs:
  validate-title:
    name: Validate PR title (Conventional Commits)
    runs-on: ubuntu-latest
    steps:
      - name: Validate PR title
        uses: amannn/action-semantic-pull-request@48f256284bd46cdaab1048c3721360e808335d50 # v6.1.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            docs
            refactor
            perf
            test
            build
            ci
            chore
            revert
          requireScope: false
          subjectPattern: ^[A-Za-z`].+$
          subjectPatternError: |
            The subject (after the type and optional scope) must start with a
            letter or backtick. Examples:
              feat(cli): add --external-deps mode
              fix(lib): handle raw pointers (void*) like GJS

  lint-commits:
    name: Lint commit messages (commitlint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      # Self-contained commitlint action: brings its own @commitlint deps and
      # auto-detects .commitlintrc.cjs. Avoids `npm install` in this Yarn
      # workspace:-protocol repo (npm rejects workspace: with EUNSUPPORTEDPROTOCOL).
      - uses: wagoid/commitlint-github-action@v6
