# Workflow to automatically update types submodule on new releases.
#
# Phase F: bootstraps @gjsify/cli via the Node-free install.mjs flow under
# stock GJS (Fedora 43 container). No npm auth needed — this workflow
# commits to a Git submodule, not the npm registry.
name: Release Types

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag to use for commit message'
        required: false
        default: 'manual'

jobs:
  update-types:
    runs-on: ubuntu-latest
    container:
      image: fedora:43
    permissions:
      actions: read

    steps:
    - name: Install container prerequisites
      run: dnf install -y git tar xz findutils curl gjs libsoup3 nodejs

    - name: Checkout repository with submodules
      uses: actions/checkout@v6
      with:
        submodules: true
        token: ${{ secrets.PAT_TOKEN }}

    - name: Bootstrap @gjsify/cli via install.mjs (Node-free)
      run: |
        curl -fsSL https://github.com/gjsify/gjsify/releases/latest/download/install.mjs -o /tmp/g.mjs
        gjs -m /tmp/g.mjs
        rm /tmp/g.mjs
        echo "$HOME/.local/bin" >> "$GITHUB_PATH"

    - run: gjsify --version

    - name: Install dependencies
      run: gjsify install

    - name: Prepare types-release submodule
      env:
        PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
      run: |
        cd types-release
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git remote set-url origin "https://x-access-token:${PAT_TOKEN}@github.com/gjsify/types.git"
        git fetch origin
        git checkout main
        git pull origin main

    - name: Generate release types
      env:
        WS_PATH: ${{ github.workspace }}
      run: PATH="$WS_PATH/node_modules/.bin:$PATH" gjsify run build:types:release

    - name: Check for changes in types-release submodule
      id: check-changes
      run: |
        cd types-release
        if [ -n "$(git status --porcelain)" ]; then
          echo "changes=true" >> $GITHUB_OUTPUT
          echo "Changes detected in types-release submodule"
        else
          echo "changes=false" >> $GITHUB_OUTPUT
          echo "No changes detected in types-release submodule"
        fi

    - name: Commit and push types changes
      if: steps.check-changes.outputs.changes == 'true'
      env:
        RELEASE_TAG: ${{ github.event.release.tag_name || github.event.inputs.release_tag || 'unknown' }}
        REPO: ${{ github.repository }}
      run: |
        cd types-release
        git add .
        git commit -m "chore: update types for release ${RELEASE_TAG}

        Automated commit from ts-for-gir release workflow.
        Generated types for release: ${RELEASE_TAG}

        Source: ${REPO}@${RELEASE_TAG}"
        git push origin main

    - name: Summary
      env:
        RELEASE_TAG: ${{ github.event.release.tag_name || github.event.inputs.release_tag || 'unknown' }}
        CHANGES: ${{ steps.check-changes.outputs.changes }}
      run: |
        if [ "$CHANGES" = "true" ]; then
          echo "Types successfully updated and committed for release ${RELEASE_TAG}"
        else
          echo "No changes detected in generated types"
        fi
