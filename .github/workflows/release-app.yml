# Workflow to automatically publish app packages to npm on new releases.
#
# Phase F: bootstraps @gjsify/cli via the Node-free install.mjs flow under
# stock GJS (Fedora 43 container), then uses `gjsify publish` (Phase E)
# for the actual npm push. Auth is handled by writing a minimal ~/.npmrc
# directly rather than going through actions/setup-node.
name: Release App

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag to use for commit message'
        required: false
        default: 'manual'

jobs:
  publish-app:
    name: Publish App to NPM
    runs-on: ubuntu-latest
    container:
      image: fedora:43
    permissions:
      contents: write
      id-token: write

    steps:
    - name: Install container prerequisites
      run: |

        dnf install -y git tar xz findutils curl gjs libsoup3 nodejs

        git config --global --add safe.directory "*"

    # `types-dev` provides the `@girs/*` workspaces that examples (and
    # therefore `gjsify install --immutable`) reference via `workspace:^`.
    # Without `submodules: true` the install step fails with "no workspace
    # with that name exists" for every `@girs/<lib>` workspace dep. Matches
    # the equivalent step in release-types.yml + release-docs.yml.
    - name: Checkout repository
      uses: actions/checkout@v6
      with:
        submodules: true

    # npm Trusted Publishing (OIDC). gjsify publish 0.4.16+ auto-detects
    # OIDC mode when ACTIONS_ID_TOKEN_REQUEST_URL + _TOKEN are present
    # (handled by GitHub Actions because the workflow declares
    # `id-token: write` above) AND no NODE_AUTH_TOKEN env is exported.
    # Both `@ts-for-gir/*` and `@gi.ts/*` packages have Trusted Publisher
    # entries configured for this repo + this workflow filename on
    # npmjs.com, so a per-package OIDC exchange yields a short-lived
    # (~5min) publish token. No long-lived NPM_TOKEN secret needed; the
    # previous Setup-npm-auth step is retired.

    - name: Bootstrap @gjsify/cli via install.mjs (Node-free)
      run: |
        curl -fsSL https://github.com/gjsify/gjsify/releases/latest/download/install.mjs -o /tmp/g.mjs
        gjs -m /tmp/g.mjs
        rm /tmp/g.mjs
        echo "$HOME/.local/bin" >> "$GITHUB_PATH"

    - run: gjsify --version

    - name: Install dependencies (full workspace)
      run: gjsify install --immutable

    - name: Build Node.js app bundle
      env:
        WS_PATH: ${{ github.workspace }}
      run: PATH="$WS_PATH/node_modules/.bin:$PATH" gjsify run build:app

    - name: Build GJS bundle
      env:
        WS_PATH: ${{ github.workspace }}
      run: PATH="$WS_PATH/node_modules/.bin:$PATH" gjsify run build:app:gjs

    # The GJS bundle ships inside the npm tarball under bin/ts-for-gir-gjs
    # (declared via `gjsify.bin` in @ts-for-gir/cli's package.json). Both
    # `npm i -g`, `gjsify install -g`, and the install.mjs bootstrapper
    # resolve it from there.

    - name: Publish app packages to npm
      env:
        WS_PATH: ${{ github.workspace }}
        # Surface OIDC mode + per-package PUT URLs in the job log so a
        # failed exchange can be debugged without re-running with a
        # local patch. Equivalent of gjsify/gjsify's release.yml.
        GJSIFY_PUBLISH_DEBUG: "1"
      run: PATH="$WS_PATH/node_modules/.bin:$PATH" gjsify run publish:app

    - name: Summary
      env:
        RELEASE_TAG: ${{ github.event.release.tag_name || github.event.inputs.release_tag || 'unknown' }}
      run: |
        echo "App packages successfully published to npm for release ${RELEASE_TAG}"
        echo "Published packages: @ts-for-gir/* and @gi.ts/*"
