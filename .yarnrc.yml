approvedGitRepositories:
  - "**"

compressionLevel: mixed

enableGlobalCache: false

enableScripts: false

# Yarn PnP is the long-term goal but breaks the GJS bundle at runtime:
# the gjsify rewriter resolves `import.meta.url` for code inside PnP zip
# caches to paths under `.yarn/__virtual__/<pkg>.zip/...`, which don't
# physically exist outside the PnP runtime. node_modules/ linker keeps
# all dependency files on the filesystem so the rewritten paths resolve.
# Tracked as a follow-up to F5 in gjsify/.claude/plan-native-install-dlx.md.
nodeLinker: node-modules

npmRegistryServer: "https://registry.npmjs.org"

packageExtensions:
  "@farmfe/cli@*":
    dependencies:
      "@farmfe/core": "*"
  "@parcel/fs@*":
    dependencies:
      "@parcel/core": "*"
  "@parcel/node-resolver-core@*":
    dependencies:
      "@parcel/core": "*"
  "@parcel/types@*":
    dependencies:
      "@parcel/core": "*"
  conventional-changelog@*:
    dependencies:
      conventional-commits-filter: "*"

pnpMode: loose

yarnPath: .yarn/releases/yarn-4.14.1.cjs
