approvedGitRepositories:
  - "**"

compressionLevel: mixed

enableGlobalCache: false

enableScripts: false

# Required for the GJS bundle (`yarn workspace @ts-for-gir/cli build:gjs`).
# Under Yarn PnP, the gjsify rewriter (`@gjsify/esbuild-plugin-gjsify`)
# resolves `import.meta.url` to `.yarn/__virtual__/<pkg>.zip/...` paths
# that only exist inside the PnP runtime — bundled `readFileSync(URL)`
# calls in typedoc/yargs/mini-shiki/... then crash with ENOENT on GJS.
# Per-package `dependenciesMeta.unplugged` was tried and rejected (~100
# transitive deps reach the bundle through zips). Tracked as a follow-up
# in gjsify STATUS.md → Open TODOs (rewriter must inline zip-resident
# static reads). The build itself emits a `[gjsify] rewriter:` warning
# under PnP that points back to this comment.
nodeLinker: node-modules

npmRegistryServer: "https://registry.npmjs.org"

packageExtensions:
  "@farmfe/cli@*":
    dependencies:
      "@farmfe/core": "*"
  "@parcel/fs@*":
    dependencies:
      "@parcel/core": "*"
  "@parcel/node-resolver-core@*":
    dependencies:
      "@parcel/core": "*"
  "@parcel/types@*":
    dependencies:
      "@parcel/core": "*"
  conventional-changelog@*:
    dependencies:
      conventional-commits-filter: "*"

pnpMode: loose

yarnPath: .yarn/releases/yarn-4.14.1.cjs
