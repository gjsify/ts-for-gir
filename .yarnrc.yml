approvedGitRepositories:
  - "**"

compressionLevel: mixed

enableGlobalCache: false

enableScripts: false

nodeLinker: node-modules

npmRegistryServer: "https://registry.npmjs.org"

packageExtensions:
  "@farmfe/cli@*":
    dependencies:
      "@farmfe/core": "*"
  "@parcel/fs@*":
    dependencies:
      "@parcel/core": "*"
  "@parcel/node-resolver-core@*":
    dependencies:
      "@parcel/core": "*"
  "@parcel/types@*":
    dependencies:
      "@parcel/core": "*"
  conventional-changelog@*:
    dependencies:
      conventional-commits-filter: "*"
  "@gjsify/esbuild-plugin-gjsify@*":
    dependencies:
      esbuild: "*"
  "@ts-for-gir/generator-html-doc@*":
    dependencies:
      "@gjsify/fs": "*"
      "@gjsify/path": "*"
  "@ts-for-gir/generator-json@*":
    dependencies:
      "@gjsify/fs": "*"
      "@gjsify/os": "*"
      "@gjsify/path": "*"
  "@ts-for-gir/generator-typescript@*":
    dependencies:
      "@gjsify/fs": "*"
      "@gjsify/path": "*"
      "@gjsify/url": "*"
  "@ts-for-gir/lib@*":
    dependencies:
      "@gjsify/fs": "*"
      "@gjsify/module": "*"
      "@gjsify/path": "*"
      "@gjsify/url": "*"
      "@gjsify/util": "*"
  "@ts-for-gir/reporter@*":
    dependencies:
      "@gjsify/fs": "*"
      "@gjsify/path": "*"
      "@gjsify/url": "*"
  "@ts-for-gir/language-server@*":
    dependencies:
      "@gjsify/fs": "*"
      "@gjsify/path": "*"
  "@ts-for-gir/typedoc-theme@*":
    dependencies:
      "@gjsify/fs": "*"
      "@gjsify/path": "*"
      "@gjsify/url": "*"
      "@gjsify/zlib": "*"

pnpMode: loose

yarnPath: .yarn/releases/yarn-4.14.1.cjs
