# This workflow installs Node deps via gjsify install (Node-free GJS bundle),
# then builds + tests. ts-for-gir's own generated TypeScript types are checked
# in build-validate against the committed types-dev submodule.

name: CI

on:
  push:
    branches:
      - main
    paths:
      - 'packages/**'
      - 'tests/**'
      - 'girs/**'
      - 'examples/**'
      - 'package.json'
      - 'gjsify-lock.json'
      - '.ts-for-gir.*.rc.js'
      - 'tsconfig*.json'
      - '.github/workflows/ci.yml'
  pull_request:
    branches:
      - "*"
    paths:
      - 'packages/**'
      - 'tests/**'
      - 'girs/**'
      - 'examples/**'
      - 'package.json'
      - 'gjsify-lock.json'
      - '.ts-for-gir.*.rc.js'
      - 'tsconfig*.json'
      - '.github/workflows/ci.yml'
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: false
      - name: Checkout types-dev submodule
        run: |
          git config --global url."https://github.com/".insteadOf "git@github.com:"
          git submodule update --init types-dev
      - name: Use Node.js 24.x
        uses: actions/setup-node@v4
        with:
          node-version: 24.x
      - name: Install @gjsify/cli globally (bootstrap)
        run: npm install -g @gjsify/cli@^0.4.9
      - run: gjsify install --immutable
      - run: PATH="$PWD/node_modules/.bin:$PATH" gjsify run check

  test-units:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: false
      - name: Checkout types-dev submodule
        run: |
          git config --global url."https://github.com/".insteadOf "git@github.com:"
          git submodule update --init types-dev
      - name: Use Node.js 24.x
        uses: actions/setup-node@v4
        with:
          node-version: 24.x
      - name: Install @gjsify/cli globally (bootstrap)
        run: npm install -g @gjsify/cli@^0.4.9
      - run: gjsify install --immutable
      - run: PATH="$PWD/node_modules/.bin:$PATH" gjsify run test:tests

  build-validate:
    runs-on: ubuntu-latest
    needs: [check, test-units]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: true
      - name: Detect changed paths
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            generator:
              - 'packages/**'
              - 'girs/**'
              - '.ts-for-gir.*.rc.js'
              - 'gjsify-lock.json'
            examples:
              - 'examples/**'
              - 'packages/**'
      - name: Use Node.js 24.x
        uses: actions/setup-node@v4
        with:
          node-version: 24.x
      - name: Cache apt packages
        uses: actions/cache@v4
        with:
          path: /var/cache/apt/archives
          key: apt-${{ runner.os }}-${{ hashFiles('.github/workflows/ci.yml') }}
          restore-keys: apt-${{ runner.os }}-
      - name: Update package repository
        run: sudo apt-get update
      - name: Install system dependencies
        run: |
          sudo apt-get --yes install gjs blueprint-compiler libappindicator3-dev \
            libgda-5.0-dev libgirepository1.0-dev libgtk-3-dev libgtk-4-dev \
            libgtksourceview-3.0-dev libnotify-dev libsoup2.4-dev libsoup-3.0-dev \
            libwebkit2gtk-4.1-dev libadwaita-1-dev gnome-shell-common \
            libmutter-14-dev libgcr-3-dev libgnome-desktop-4-dev build-essential \
            gobject-introspection libgirepository1.0-dev libcairo2-dev libdex-dev
      - name: Install @gjsify/cli globally (bootstrap)
        run: npm install -g @gjsify/cli@^0.4.9
      - run: node --version
      - run: gjs --version
      - run: gjsify --version
      - run: gjsify install
      - run: PATH="$PWD/node_modules/.bin:$PATH" gjsify run build:types
        if: steps.filter.outputs.generator == 'true' || github.event_name == 'workflow_dispatch'
      - name: Show diff
        if: steps.filter.outputs.generator == 'true' || github.event_name == 'workflow_dispatch'
        run: (cd ./types-dev && git diff | cat)
      - run: PATH="$PWD/node_modules/.bin:$PATH" gjsify run build:examples
        if: steps.filter.outputs.examples == 'true' || github.event_name == 'workflow_dispatch'
      - run: PATH="$PWD/node_modules/.bin:$PATH" gjsify run check:examples
        if: steps.filter.outputs.examples == 'true' || github.event_name == 'workflow_dispatch'
      - run: PATH="$PWD/node_modules/.bin:$PATH" gjsify run test:examples:cli
        if: steps.filter.outputs.examples == 'true' || github.event_name == 'workflow_dispatch'
      - run: PATH="$PWD/node_modules/.bin:$PATH" gjsify run check:types
        if: steps.filter.outputs.generator == 'true' || github.event_name == 'workflow_dispatch'
