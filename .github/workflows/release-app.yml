# Workflow to automatically publish app packages to npm on new releases.
#
# Phase F: bootstraps @gjsify/cli via the Node-free install.mjs flow under
# stock GJS (Fedora 43 container), then uses `gjsify publish` (Phase E)
# for the actual npm push. Auth is handled by writing a minimal ~/.npmrc
# directly rather than going through actions/setup-node.
name: Release App

on:
  release:
    types: [published]
  # Manual reruns. Two scenarios:
  #   1. Re-publish + (re-)upload assets for a real existing release whose
  #      original `release`-event run didn't finish (asset upload skipped,
  #      partial publish, etc). Pass the tag in `release_tag`; the workflow
  #      rebuilds + republishes + uploads the assets to the named release.
  #   2. Ad-hoc smoke test from main with no release attached. Leave
  #      `release_tag` empty.
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Existing release tag to (re)upload assets to (e.g. v4.0.0-rc.17). Leave empty for a no-op dispatch from main.'
        required: false
        default: ''
      skip_publish:
        description: 'Skip the npm publish step (default true — re-uploads are for fixing missing release assets; npm side already published).'
        required: false
        type: boolean
        default: true

jobs:
  publish-app:
    name: Publish App to NPM
    runs-on: ubuntu-latest
    container:
      image: fedora:43
    permissions:
      contents: write
      id-token: write

    steps:
    - name: Install container prerequisites
      run: |

        dnf install -y git tar xz findutils curl gjs libsoup3 nodejs

        git config --global --add safe.directory "*"

    # `types-dev` provides the `@girs/*` workspaces that examples (and
    # therefore `gjsify install --immutable`) reference via `workspace:^`.
    # Without `submodules: true` the install step fails with "no workspace
    # with that name exists" for every `@girs/<lib>` workspace dep. Matches
    # the equivalent step in release-types.yml + release-docs.yml.
    # `release` event auto-checks-out the tag. `workflow_dispatch` with a
    # `release_tag` input must explicitly target that tag so the rebuilt
    # bundle + install.js match what shipped (not main HEAD).
    - name: Checkout repository
      uses: actions/checkout@v6
      with:
        submodules: true
        ref: ${{ github.event.release.tag_name || inputs.release_tag || github.ref }}

    # npm Trusted Publishing (OIDC). gjsify publish 0.4.16+ auto-detects
    # OIDC mode when ACTIONS_ID_TOKEN_REQUEST_URL + _TOKEN are present
    # (handled by GitHub Actions because the workflow declares
    # `id-token: write` above) AND no NODE_AUTH_TOKEN env is exported.
    # Both `@ts-for-gir/*` and `@gi.ts/*` packages have Trusted Publisher
    # entries configured for this repo + this workflow filename on
    # npmjs.com, so a per-package OIDC exchange yields a short-lived
    # (~5min) publish token. No long-lived NPM_TOKEN secret needed; the
    # previous Setup-npm-auth step is retired.

    - name: Bootstrap @gjsify/cli via install.mjs (Node-free)
      run: |
        curl -fsSL https://github.com/gjsify/gjsify/releases/latest/download/install.mjs -o /tmp/g.mjs
        gjs -m /tmp/g.mjs
        rm /tmp/g.mjs
        echo "$HOME/.local/bin" >> "$GITHUB_PATH"

    - run: gjsify --version

    - name: Install dependencies (full workspace)
      run: gjsify install --immutable

    - name: Build Node.js app bundle
      env:
        WS_PATH: ${{ github.workspace }}
      run: PATH="$WS_PATH/node_modules/.bin:$PATH" gjsify run build:app

    - name: Build GJS bundle
      env:
        WS_PATH: ${{ github.workspace }}
      run: PATH="$WS_PATH/node_modules/.bin:$PATH" gjsify run build:app:gjs

    # The GJS bundle ships inside the npm tarball under bin/ts-for-gir-gjs
    # (declared via `gjsify.bin` in @ts-for-gir/cli's package.json). Both
    # `npm i -g`, `gjsify install -g`, and the install.mjs bootstrapper
    # resolve it from there.

    # Publish to npm on the `release` event (always) or on
    # workflow_dispatch with skip_publish=false. Re-running an existing
    # release should leave npm alone (each version is published exactly
    # once); use skip_publish=true (the default) when the goal is just to
    # (re-)upload missing release assets without touching npm.
    - name: Publish app packages to npm
      if: ${{ github.event_name == 'release' || inputs.skip_publish == false }}
      env:
        WS_PATH: ${{ github.workspace }}
        # Surface OIDC mode + per-package PUT URLs in the job log so a
        # failed exchange can be debugged without re-running with a
        # local patch. Equivalent of gjsify/gjsify's release.yml.
        GJSIFY_PUBLISH_DEBUG: "1"
      run: PATH="$WS_PATH/node_modules/.bin:$PATH" gjsify run publish:app

    # Ship the Node-free install path:
    #   - install.js          bootstrap script users curl to install ts-for-gir
    #                         without Node (`curl -fsSL <rel>/download/install.js | gjs -m -`)
    #   - ts-for-gir-gjs      GJS bundle that `ts-for-gir self-update` looks for
    #                         under GJS_ASSET_NAME (see packages/cli/src/commands/
    #                         self-update.ts). Without this asset on the release,
    #                         self-update falls back to "use npm update".
    #   - ts-for-gir-gjs.sha256  checksum companion for install verification.
    #
    # Uploads only on the `release` event (normal flow) or on a
    # `workflow_dispatch` run that explicitly names a `release_tag` —
    # mirrors gjsify/gjsify's release.yml asset-upload gating.
    - name: Generate ts-for-gir-gjs.sha256
      if: github.event_name == 'release' || inputs.release_tag != ''
      run: |
        cd packages/cli/bin
        sha256sum ts-for-gir-gjs | awk '{print $1}' > ts-for-gir-gjs.sha256
        cat ts-for-gir-gjs.sha256

    - name: Upload installer + GJS bundle to GitHub release
      if: github.event_name == 'release' || inputs.release_tag != ''
      uses: softprops/action-gh-release@v3
      with:
        # On `release` softprops infers tag_name from the event payload.
        # On `workflow_dispatch` we must pass it explicitly so the action
        # targets the operator-specified tag instead of creating a new
        # release from HEAD.
        tag_name: ${{ github.event.release.tag_name || inputs.release_tag }}
        files: |
          install.js
          packages/cli/bin/ts-for-gir-gjs
          packages/cli/bin/ts-for-gir-gjs.sha256

    - name: Summary
      env:
        RELEASE_TAG: ${{ github.event.release.tag_name || github.event.inputs.release_tag || 'unknown' }}
      run: |
        echo "App packages successfully published to npm for release ${RELEASE_TAG}"
        echo "Published packages: @ts-for-gir/* and @gi.ts/*"
        echo "Release assets uploaded: install.js, ts-for-gir-gjs, ts-for-gir-gjs.sha256"
